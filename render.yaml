services:
  - type: web
    name: soapveda-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: soapveda-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
